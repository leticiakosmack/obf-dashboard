<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Premissas OBF — Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet">
<style>
  :root{--bg:#0a0a0f;--surface:#13131a;--surface2:#1c1c28;--surface3:#252535;--border:#2e2e45;--accent:#8b5cf6;--accent2:#06b6d4;--text:#e8e8f0;--text2:#9999b8;--text3:#5a5a7a;--radius:12px;--radius-sm:8px}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
  body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 80% 50% at 20% -10%,rgba(139,92,246,.12) 0%,transparent 60%),radial-gradient(ellipse 60% 40% at 80% 110%,rgba(6,182,212,.08) 0%,transparent 50%);pointer-events:none;z-index:0}
  .header{position:sticky;top:0;z-index:100;background:rgba(10,10,15,.92);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);padding:0 32px;display:flex;align-items:center;gap:24px;height:64px}
  .header-logo{font-family:'Syne',sans-serif;font-weight:800;font-size:20px;letter-spacing:-.5px;color:var(--text);display:flex;align-items:center;gap:10px;flex-shrink:0}
  .header-logo .dot{width:8px;height:8px;border-radius:50%;background:var(--accent);box-shadow:0 0 12px var(--accent)}
  .header-search{flex:1;max-width:420px;position:relative}
  .header-search input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:8px 16px 8px 40px;color:var(--text);font-family:inherit;font-size:14px;outline:none;transition:border-color .2s}
  .header-search input:focus{border-color:var(--accent)}
  .header-search input::placeholder{color:var(--text3)}
  .search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:16px}
  .header-stats{margin-left:auto;display:flex;gap:20px;font-size:13px;color:var(--text2)}
  .header-stats span strong{color:var(--accent);font-family:'Syne',sans-serif}
  .layout{display:flex;min-height:calc(100vh - 64px);position:relative;z-index:1}
  .sidebar{width:260px;flex-shrink:0;background:var(--surface);border-right:1px solid var(--border);padding:24px 0;overflow-y:auto;max-height:calc(100vh - 64px);position:sticky;top:64px}
  .sidebar-section-title{font-family:'Syne',sans-serif;font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--text3);padding:0 20px 12px}
  .sidebar-actions{padding:0 16px 16px;display:flex;gap:8px}
  .btn-sm{flex:1;padding:6px 10px;border-radius:var(--radius-sm);border:1px solid var(--border);background:transparent;color:var(--text2);font-family:'DM Sans',sans-serif;font-size:12px;cursor:pointer;transition:all .15s}
  .btn-sm:hover{background:var(--surface2);color:var(--text)}
  .squad-item{display:flex;align-items:center;gap:10px;padding:9px 16px 9px 20px;cursor:pointer;transition:background .15s;border-left:3px solid transparent}
  .squad-item:hover{background:var(--surface2)}
  .squad-item.active{background:rgba(139,92,246,.1);border-left-color:var(--accent)}
  .squad-checkbox{width:16px;height:16px;border-radius:4px;border:1.5px solid var(--border);background:transparent;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .15s}
  .squad-item.active .squad-checkbox{background:var(--accent);border-color:var(--accent)}
  .squad-checkbox::after{content:'';width:8px;height:5px;border-left:1.5px solid white;border-bottom:1.5px solid white;transform:rotate(-45deg) translateY(-1px);opacity:0;transition:opacity .1s}
  .squad-item.active .squad-checkbox::after{opacity:1}
  .squad-name{font-size:13px;color:var(--text2);flex:1;transition:color .15s}
  .squad-item.active .squad-name{color:var(--text);font-weight:500}
  .squad-count{font-size:11px;font-family:'Syne',sans-serif;background:var(--surface3);color:var(--text3);padding:2px 7px;border-radius:10px}
  .squad-item.active .squad-count{background:rgba(139,92,246,.2);color:var(--accent)}
  .sidebar-divider{height:1px;background:var(--border);margin:8px 0}
  .type-filter{padding:12px 16px 0}
  .type-tags{display:flex;flex-wrap:wrap;gap:6px;padding:8px 0 16px}
  .type-tag{padding:4px 10px;border-radius:20px;border:1px solid var(--border);font-size:11px;color:var(--text3);cursor:pointer;transition:all .15s;background:transparent;font-family:'DM Sans',sans-serif;white-space:nowrap}
  .type-tag:hover{border-color:var(--accent);color:var(--text2)}
  .type-tag.active{background:rgba(139,92,246,.15);border-color:var(--accent);color:var(--accent)}
  .main{flex:1;padding:28px 32px;overflow-y:auto}
  .toolbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;gap:16px;flex-wrap:wrap}
  .toolbar-left{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
  .results-label{font-size:14px;color:var(--text2)}
  .results-label strong{color:var(--text);font-family:'Syne',sans-serif;font-size:16px}
  .active-filters{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
  .filter-pill{display:flex;align-items:center;gap:6px;background:rgba(139,92,246,.12);border:1px solid rgba(139,92,246,.3);border-radius:20px;padding:3px 10px;font-size:12px;color:var(--accent)}
  .filter-pill button{background:none;border:none;color:var(--accent);cursor:pointer;padding:0;font-size:14px;line-height:1;opacity:.7}
  .filter-pill button:hover{opacity:1}
  .view-toggle{display:flex;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);overflow:hidden}
  .view-btn{padding:7px 12px;border:none;background:transparent;color:var(--text3);cursor:pointer;font-size:15px;transition:all .15s}
  .view-btn.active{background:var(--surface2);color:var(--text)}
  .empty{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:80px 20px;color:var(--text3);text-align:center;gap:12px}
  .empty-icon{font-size:48px}
  .empty h3{font-family:'Syne',sans-serif;font-size:18px;color:var(--text2)}
  .squad-group{margin-bottom:36px;animation:fadeIn .3s ease both}
  @keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
  .squad-group-header{display:flex;align-items:center;gap:12px;margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid var(--border)}
  .squad-badge{font-family:'Syne',sans-serif;font-weight:700;font-size:17px;color:var(--text)}
  .squad-group-count{font-size:12px;color:var(--text3);background:var(--surface2);padding:2px 8px;border-radius:10px}
  .squad-color-bar{width:3px;height:22px;border-radius:2px}
  .cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:16px}
  .obf-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;transition:border-color .2s,transform .2s,box-shadow .2s;cursor:pointer;display:flex;flex-direction:column}
  .obf-card:hover{border-color:var(--accent);transform:translateY(-2px);box-shadow:0 8px 32px rgba(139,92,246,.12)}
  .card-header{padding:14px 16px 10px;display:flex;align-items:flex-start;gap:10px;border-bottom:1px solid var(--border);background:var(--surface2)}
  .card-no{font-family:'Syne',sans-serif;font-size:11px;font-weight:700;color:var(--text3);background:var(--surface3);padding:2px 8px;border-radius:4px;flex-shrink:0;margin-top:2px;letter-spacing:.5px}
  .card-titles{flex:1}
  .card-tipo{font-size:13px;font-weight:600;color:var(--text);margin-bottom:3px;line-height:1.3}
  .card-subtipo{font-size:12px;color:var(--text2);line-height:1.3}
  .card-type-badge{flex-shrink:0;padding:3px 8px;border-radius:20px;font-size:10px;font-weight:500;margin-top:2px;max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .card-body{padding:12px 16px;flex:1}
  .card-section{margin-bottom:10px}
  .card-section-label{font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--text3);margin-bottom:4px;display:flex;align-items:center;gap:6px}
  .card-section-label::before{content:'';width:3px;height:3px;border-radius:50%;background:var(--accent2)}
  .card-section-text{font-size:12.5px;color:var(--text2);line-height:1.55;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
  .card-footer{padding:10px 16px;border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
  .card-squad-chip{font-size:11px;color:var(--text3)}
  .expand-btn{font-size:11px;color:var(--accent);background:none;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;padding:4px 10px;border-radius:6px;transition:background .15s}
  .expand-btn:hover{background:rgba(139,92,246,.15)}
  .table-view{width:100%;border-collapse:collapse;font-size:13px}
  .table-view th{text-align:left;padding:10px 14px;background:var(--surface);border-bottom:2px solid var(--border);font-family:'Syne',sans-serif;font-size:11px;letter-spacing:.8px;text-transform:uppercase;color:var(--text2)}
  .table-view td{padding:10px 14px;border-bottom:1px solid var(--border);color:var(--text2);vertical-align:top;line-height:1.5}
  .table-view tr:hover td{background:var(--surface);cursor:pointer}
  .table-view td.squad-cell{font-family:'Syne',sans-serif;font-size:12px;color:var(--text3);white-space:nowrap}
  .table-view td.tipo-cell{font-weight:500;color:var(--text)}
  .truncate-cell{display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
  .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);backdrop-filter:blur(4px);z-index:1000;display:flex;align-items:center;justify-content:center;padding:20px;opacity:0;pointer-events:none;transition:opacity .2s}
  .modal-overlay.open{opacity:1;pointer-events:all}
  .modal{background:var(--surface);border:1px solid var(--border);border-radius:16px;max-width:720px;width:100%;max-height:85vh;overflow-y:auto;transform:translateY(20px);transition:transform .2s;box-shadow:0 24px 80px rgba(0,0,0,.5)}
  .modal-overlay.open .modal{transform:translateY(0)}
  .modal-header{padding:20px 24px 16px;border-bottom:1px solid var(--border);background:var(--surface2);position:sticky;top:0;z-index:1;display:flex;align-items:flex-start;gap:16px}
  .modal-header-info{flex:1}
  .modal-no{font-family:'Syne',sans-serif;font-size:11px;font-weight:700;color:var(--text3);letter-spacing:.5px;margin-bottom:6px}
  .modal-tipo{font-family:'Syne',sans-serif;font-size:20px;font-weight:700;color:var(--text);margin-bottom:4px;line-height:1.2}
  .modal-subtipo{font-size:14px;color:var(--text2)}
  .modal-close{background:var(--surface3);border:1px solid var(--border);border-radius:8px;width:36px;height:36px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text2);font-size:18px;transition:all .15s;flex-shrink:0}
  .modal-close:hover{background:var(--surface2);color:var(--text)}
  .modal-body{padding:24px;display:flex;flex-direction:column;gap:20px}
  .modal-section{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
  .modal-section-header{padding:10px 16px;background:var(--surface3);font-family:'Syne',sans-serif;font-size:10px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;color:var(--text2);display:flex;align-items:center;gap:8px}
  .modal-section-content{padding:14px 16px;font-size:13.5px;color:var(--text2);line-height:1.8;white-space:pre-wrap;word-break:break-word}
  .type-suspensao{background:rgba(6,182,212,.12);color:#06b6d4;border:1px solid rgba(6,182,212,.3)}
  .type-inexigivel{background:rgba(139,92,246,.12);color:#a78bfa;border:1px solid rgba(139,92,246,.3)}
  .type-reativar{background:rgba(16,185,129,.12);color:#10b981;border:1px solid rgba(16,185,129,.3)}
  .type-cancelamento{background:rgba(244,63,94,.12);color:#f43f5e;border:1px solid rgba(244,63,94,.3)}
  .type-solicitacao{background:rgba(245,158,11,.12);color:#f59e0b;border:1px solid rgba(245,158,11,.3)}
  .type-liminar{background:rgba(249,115,22,.12);color:#f97316;border:1px solid rgba(249,115,22,.3)}
  .type-parcelamento{background:rgba(168,85,247,.12);color:#c084fc;border:1px solid rgba(168,85,247,.3)}
  .type-taxa{background:rgba(20,184,166,.12);color:#2dd4bf;border:1px solid rgba(20,184,166,.3)}
  .type-premissa{background:rgba(96,165,250,.12);color:#60a5fa;border:1px solid rgba(96,165,250,.3)}
  .type-default{background:rgba(100,100,150,.12);color:#8888aa;border:1px solid rgba(100,100,150,.3)}
  .sc0{background:#8b5cf6}.sc1{background:#06b6d4}.sc2{background:#10b981}.sc3{background:#f59e0b}.sc4{background:#f43f5e}.sc5{background:#f97316}.sc6{background:#a78bfa}.sc7{background:#2dd4bf}.sc8{background:#fb923c}.sc9{background:#e879f9}.sc10{background:#34d399}.sc11{background:#60a5fa}.sc12{background:#f472b6}.sc13{background:#facc15}.sc14{background:#4ade80}.sc15{background:#818cf8}.sc16{background:#fb7185}.sc17{background:#38bdf8}.sc18{background:#f0abfc}.sc19{background:#86efac}
  mark{background:rgba(245,158,11,.3);color:inherit;border-radius:2px;padding:0 1px}
  ::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
</style>
</head>
<body>

<div class="modal-overlay" id="modal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-header-info">
        <div class="modal-no" id="modalNo"></div>
        <div class="modal-tipo" id="modalTipo"></div>
        <div class="modal-subtipo" id="modalSubtipo"></div>
      </div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
  </div>
</div>

<header class="header">
  <div class="header-logo"><div class="dot"></div>Premissas OBF</div>
  <div class="header-search">
    <span class="search-icon">⌕</span>
    <input type="text" id="searchInput" placeholder="Buscar por tipo, subtipo, squad..." oninput="applyFilters()">
  </div>
  <div class="header-stats">
    <span><strong id="statVisible">0</strong> OBFs visíveis</span>
    <span><strong id="statSquads">0</strong> squads</span>
  </div>
</header>

<div class="layout">
  <aside class="sidebar">
    <div class="sidebar-section-title">Seções</div>
    <div class="sidebar-actions">
      <button class="btn-sm" onclick="selectAll()">Todos</button>
      <button class="btn-sm" onclick="deselectAll()">Nenhum</button>
    </div>
    <div id="squadList"></div>
    <div class="sidebar-divider"></div>
    <div class="type-filter">
      <div class="sidebar-section-title" style="padding:0 0 8px">Tipo de OBF</div>
      <div class="type-tags" id="typeTags"></div>
    </div>
  </aside>
  <main class="main">
    <div class="toolbar">
      <div class="toolbar-left">
        <div class="results-label"><strong id="resultCount">0</strong> resultados</div>
        <div class="active-filters" id="activeFilters"></div>
      </div>
      <div class="view-toggle">
        <button class="view-btn active" id="btnGrid" onclick="setView('grid')" title="Grade">⊞</button>
        <button class="view-btn" id="btnTable" onclick="setView('table')" title="Tabela">☰</button>
      </div>
    </div>
    <div id="content"></div>
  </main>
</div>

<script>
const RAW_DATA = {"Premissas Básicas": [{"no": "1.1", "tipo": "Plataforma Jira", "subtipo": "", "definicao": "", "como": "O Jira é a plataforma exclusiva para gestão das OBFs. Toda comunicação e atualização de andamento devem ser registradas obrigatoriamente nos comentários e status da tarefa correspondente, que é recebida e distribuída automaticamente para o squad do processo.\n\nÉ de responsabilidade do time que irá comprir a OBF manter o status da tarefa rigorosamente atualizado, refletindo com precisão a etapa real do cumprimento.", "comprovantes": "", "complemento": ""}, {"no": "1.2", "tipo": "Uso dos status", "subtipo": "", "definicao": "", "como": "Os status representam o andamento e o direcionamento da OBF em questão, atualmente possuimos os seguintes status:\n\n- Waiting for action: status inicial de qualquer caso. Esse status indica que o caso ainda não está sendo tratado pela pessoa responsável;\n- In progress: indica que o caso já está sendo verificado pelo responsável\n- Waiting for legal review: deve ser usado caso o time precise tirar alguma dúvida sobre o caso com o time;\n- Waiting for other team: deve ser usado quando o responsável estiver verificando pontos da tratativa com outro time;\n- OBF cumprida: deve ser utilizado após o cumprimento da OBF ter sido concluído pelo responsável e os comprovantes necessários para envio no processo ja estiverem anexados no ticket do Jira;\n- Cancelado: NÃO DEVE SER UTILIZADO PELOS TIMES DE PRODUTOS - Utilizado em casos que precisamos cancelar a OBF por algum erro dos escritórios. \n- Resolvido: NÃO DEVE SER UTILIZADO PELOS TIMES DE PRODUTOS - somente após as validações que ocorrem pelo time de OBF o status é preenchido.", "comprovantes": "", "complemento": ""}, {"no": "1.3", "tipo": "Transferencia de squads", "subtipo": "", "definicao": "", "como": "A distribuição das OBFs é realizada com base no squad responsável pela causa raiz do processo, portanto podem ocorrer alguns erros na distribuição ou até mesmo a ação específica solicitada na decisão pertencer a outro time que não o principal indicado.\n\nAssim o campo OBF Squad pode ser alterado para o correto time responsável, com os seguintes passos necessários:\n\n\n1- Alterar o status do ticket para Waiting for action novamente \n2- Retirar o ticket do nome atual, mantendo em SEM RESPONSAVEL. \n3- Clicar no botão \"Ações\" que fica ao lado da listagem de status do ticket no Jira; \n4- Clicar em \"Squad change\" e selecionar o novo squads responsável na lista apresentada.", "comprovantes": "", "complemento": ""}, {"no": "1.4", "tipo": "Utilização das tags", "subtipo": "", "definicao": "", "como": "O Jira possui um campo chamado Categorias (Labels em inglês), que hoje em dia é utilizado para registrar os passos de cadas tickets e assim permitir um melhor acompanhamento das demandas por cada time e pela governança da área.\n\nAtualmente possuimos as tags abaixo, que devem ser preenchidas de acordo com o glossário abaixo e exatamente da forma que esta sinalizado:\n\nobf_entrou_atrasada - utilizada para indicar que o ticket foi criado no Jira com a data fatal de cumprimento da decisão já expirado, ou seja, já foi criado em uma situação de atraso. Já é inserida de forma automática no ticket nessa situação. Não precisa ser adicionada manualmente\nsquad_changed - inserida de forma automática no ticket quando é realizada a alteração do Squad pela funcionalidade Ações. Não precisa ser adicionada manualmente\nobf_cumprimento_bloqueado - utilizada para indicar que aquele ticket não foi concluído dentro do prazo fatal por conta de algum bloqueio sistêmico ou de processo para o cumprimento -> não utilizar para casos de engenharia, pois já existem outras tags destinadas à esses\nobf_atraso_suporte_engenharia - utilizada para indicar que o caso não foi cumprido dentro do prazo por necessidade de escalar para engenharia\natraso_suporte_jud - utilizada para indicar que o atraso no caso se deu por necessidade de suporte do time de JudOrders.\nobf_vencimento_fds - utilizada para sinalizar OBFs que tem vencimento em dias de fim de semana e que o time não conseguirá cumprir durante a semana\nsuporte_engenharia - foi necessário escalar p/ engenharia, mas por enquanto não houve atraso. Se houver atraso, aí sim incluir a tag obf_atraso_suporte_engenharia\nnear_expired - utilizada para casos que cheguem com menos de 3 dias úteis p/ cumprimento\nretorno_squad (1, 2, 3, etc.) - utilizada pelas secondees p/ contabilizar a quantidade de retornos feitos pelo squad em um mesmo ticket na fila de Legal Review.\nretorno_jud_inconsistente - utilizada por xpeers quando o retorno dado por JudOrders não for compreensível\nobf_interpretação_complexa - quando a solicitação inicial da OBF for de difícil compreensão\nInconsistente_retorno - utilizada pelas secondees p/ contabilizar a quantidade de retornos feitos pelo squad na fila de validação.", "comprovantes": "", "complemento": ""}, {"no": "1.5", "tipo": "Utilização dos Novos Modelos de Dossiês", "subtipo": "", "definicao": "", "como": "Os dossiês deverão ser utilizados de acordo com os motivos e submotivos das OBFs, respeitando o modelo padrão, inserindo as evidências necessárias e preenchendo os campos obrigatórios de forma correta com os esclarecimentos e análises pertinentes ao caso.\n\n- Escolha o modelo que corresponde ao motivo/submotivo.\n- Preencha todos os campos obrigatórios (ID OBF, ID processo, ticket, resumo, ações, análise, conclusão, responsável e data).\n- Anexe apenas evidências que comprovem o submotivo (faturas, comprovantes, extratos, prints).\n- Nomeie os arquivos de forma clara (tipo, submotivo, ID OBF, ID processo, data).\n- Oculte ou desfoque dados sensíveis que não sejam necessários.\n- Nos prints, capture só a área relevante e destaque o que importa.\n- Prefira PDF para documentos e PNG para imagens; confirme legibilidade.\n- Revise tudo antes de finalizar e enviar.\n\nSeguindo isso, o dossiê ficará padronizado e pronto para análise.", "comprovantes": "", "complemento": ""}, {"no": "", "tipo": "Como nomear os arquivos - Dossie", "subtipo": "", "definicao": "", "como": "A clareza nos nomes dos arquivos facilita a organização e agiliza o processo de analise dos escritórios. Abaixo estão algumas diretrizes sobre como nomear diferentes tipos de documentos:\nE-mail e Chat:\nInclua o conteúdo e a data no nome do arquivo para especificar o tipo de documento. Exemplos: \"E-mail-Comunicação MED 25/09/2023\" ou \"Chat - Primeiro reporte 13/10/2024\".(A escolha é livre, desde que contenha meio de comunicação, data e conteúdo)\nExtratos:\nSempre especifique o tipo de extrato. Exemplos: \"Extrato - Conta do Nubank \" ou \"Extrato - Cartão de Crédito\".\nLigações:\nInclua o número do protocolo. Exemplos: \"Protocolo 000000000001  ou \"Protocolo 000000000002 \nFluxos e Contratos:\nDê nomes que indiquem claramente o processo ou tipo de contrato. Exemplos: \"Fluxo de Aquisição\" ou \"Contrato empréstimo\".\nKit Básico:\nUtilize um identificador claro. Exemplo: \"Kit Básico - ID 12345\"", "comprovantes": "", "complemento": ""}, {"no": "1.6", "tipo": "Aderencia ao treinamento", "subtipo": "", "definicao": "", "como": "O time deverá participar ativamente das sessões, cumprir as OBFs e as tarefas nos prazos estabelecidos e registrar as evidências, em conformidade com os alinhamentos e acordos realizados durante os treinamentos.", "comprovantes": "", "complemento": ""}, {"no": "1.7", "tipo": "Fila de Legal Review", "subtipo": "", "definicao": "", "como": "Para solicitar qualquer suporte ou tirar dúvida de um cumprimento de OBF, basta descrever a dúvida existente no comentário do ticket do Jira e alterar o status do mesmo para Waiting for Legal Review.\n\nEsse status será monitorado pelo time interno e, uma vez que ele for selecionado, o caso irá ter o seu responsável alterado para algum analista do time interno.\n\nA resposta também será dada diretamente no comentário do ticket, seguido da alteração do responsável para a pessoa que estava cuidando do caso originalmente (quem fez o questionamento da dúvida) e status do ticket será alterado para  In Progress, de modo que ele irá voltar para a fila de Follow Up da pessoa responsável com a observação de \"Retorno Jud\" para fácil localização.", "comprovantes": "", "complemento": ""}, {"no": "1.8", "tipo": "Fila de validação", "subtipo": "", "definicao": "", "como": "O time de Lawsuits será responsável pelo controle e pela administração das obrigações. Será nosso papel enviar as comprovações anexadas aos tickets do Jira ao escritório responsável por meio do Elaw, nosso sistema de controle de processos.\n\nUma vez concluída a tratativa, o time responsável deve anexar ao próprio ticket todas as telas, as explicações sobre a ação realizada e o dossiê, alterando em seguida o status no Jira para \"OBF Cumprida - Pronto Para Validação\", esses casos serão direcionados a uma fila de validação do time para a devida conclusão.", "comprovantes": "", "complemento": ""}, {"no": "1.9", "tipo": "Formatos e documentos", "subtipo": "", "definicao": "", "como": "Os comprovantes anexados no Jira referentes à OBF serão os mesmos enviados aos escritórios externos; ou seja, as evidências serão utilizadas como meio de comprovação do cumprimento da OBF. Portanto, precisamos garantir que os comprovantes estejam completos e em conformidade com a solicitação da demanda judicial.\n\nAs faturas e os extratos devem sempre estar em PDF, com um título de fácil identificação do conteúdo, por exemplo: \"Fatura Julho 2024\" ou \"Extrato Conta\". Essa regra se aplica também às comprovações de ajustes em faturas. Caso a fatura com o ajuste não esteja fechada para geração do arquivo completo em PDF, o time deverá selecionar toda a fatura e solicitar a impressão da página, salvando o documento em PDF.\n\nOs prints de tela do backoffice devem ser usados com cuidado para não revelar mais informações do que o necessário ou solicitado. Ex.: capturar apenas o widget específico e evitar mostrar informações internas de difícil compreensão externa, como nomes de squads responsáveis por cada widget ou dados de colaboradores.\n\nQuanto ao dossiê, o título padrão deverá ser o mesmo em todos os documentos, alterando-se apenas o ID do processo e o ID da OBF de acordo com o ticket do Jira. Ex.: Cumprimento de OBF - ID OBF XXX - ID Processo XXX.\n\nPONTO DE ATENÇÃO:\n\nA fatura em PDF do cartão de crédito só mostra o pagamento da fatura anterior, então se for necessário comprovar o pagamento de alguma fatura, o time precisará anexar em PDF a fatura seguinte também. Ex. se for necessário comprovar o pagamento da fatura de out/25, o time deverá anexar a fatura em PDF de nov/25 também.", "comprovantes": "", "complemento": ""}, {"no": "1.1", "tipo": "Casos com atuação de dois ou mais squads", "subtipo": "", "definicao": "", "como": "Há certos pedidos de cumprimento e squads (como Inv Ops - Fraud) que vão precisar atuar nos cumprimentos junto com outros times. Ex: O pedido relacionado a ajustes é encaminhado para Collections, ja o pedido relacionado a reativar ou cancelar a conta é direcionado a Fraud.\n\nPara esses casos é importante ambos os times envolvidos verificarem o ID do processo no Jira e identificar se têm outros times também atuando no caso. Em caso positivo, os times podem utilizar os próprios tickets do Jira para deixar algum comentário com informação/orientação necessária para o outro time envolvido, lembrando sempre que é possível marcar o @ de outra pessoa no comentário, o que deixa uma notificação para o usuário no Jira, facilitando a verificação. O ícone de Notificações fica no canto direito superior da tela, do lado do campo de pesquisa.\n\nOutras situações onde é necessário a atuação de outro time no cumprimento, o ideal é que seja utilizado a funcionalidade de alteração de squad para repassar o ticket, também deixando algum comentário sobre o caso se for necessário.", "comprovantes": "", "complemento": ""}, {"no": "1.11", "tipo": "Em caso de falha em algum dos widgets e indisponibilidade de informações", "subtipo": "", "definicao": "", "como": "Caso a falha não tenha correção prevista e esteja impedindo o envio de uma determinada informação, como num crash, sempre sinalize no dossiê que houve uma falha sistêmica na coleta da informação e oriente o advogado a solicitar a informação posteriormente via comunicação interna no e-Law. Dessa forma QA também tem ciência acerca da ausência de informação.", "comprovantes": "", "complemento": ""}, {"no": "1.12", "tipo": "Criação drive", "subtipo": "", "definicao": "", "como": "É necessário que cada time tenha sua própria pasta no drive com as cópias dos dossiês modelos.", "comprovantes": "", "complemento": ""}, {"no": "1.13", "tipo": "Como subir o anexo via Jira", "subtipo": "", "definicao": "", "como": "Após a análise ou finalização da tratativa, o time deverá seguir as orientações para subir no Jira os anexos pertinentes ao caso: \"Add internal note\" > \"Add image, video, or file\" > \"Upload\" > Selecionar os anexos necessários > \"Save\" e encaminhar o ticket para a fila adequada.", "comprovantes": "", "complemento": ""}, {"no": "1.14", "tipo": "Análise da petição inicial", "subtipo": "", "definicao": "", "como": "É o documento redigido pelo(a) advogado(a) da parte autora do processo, para relatar o objeto da demanda judicial juntamente com todo o embasamento jurídico e os pedido que estão sendo feitos.\n\nÉ por meio do relato que consta tópico \"Dos Fatos\" presente na petição inicial que é possível verificar do que se trata o caso no detalhe.", "comprovantes": "", "complemento": ""}, {"no": "1.15", "tipo": "Os documentos anexados devem ser condizentes com o submotivo utilizado no Dossiê", "subtipo": "", "definicao": "", "como": "Os documentos anexados ao dossiê devem corresponder exatamente ao submotivo registrado, de modo a garantir coerência, agilidade na análise e conformidade com a demanda judicial. Antes de anexar, verifique se o conteúdo do arquivo comprova especificamente o fato indicado no submotivo (por exemplo: pagamento, ajuste de fatura, cancelamento, autorização), se as datas e valores conferem com as informações do ticket e se não há dados irrelevantes ou sensíveis expostos.\n\nRecomenda-se seguir estas orientações:\n\n- Nomear os arquivos de forma clara, incluindo o submotivo, o ID processo e ID da OBF ao título do dossiê.\n- Anexar apenas documentos que efetivamente comprovem o submotivo; evite arquivos genéricos ou supérfluos.\n- Incluir captura de tela ou extrato apenas do trecho pertinente (widget, lançamento, linha da fatura), ocultando informações desnecessárias.\n- Conferir formato (preferencialmente PDF), legibilidade e integridade dos documentos antes do envio.\n- Se houver múltiplos documentos para o mesmo submotivo, adicionar uma breve descrição no dossiê explicando a relevância de cada arquivo.\n\nA aderência entre documentos e submotivo facilita a validação do cumprimento da obrigação e reduz retrabalhos e solicitações de complementação.", "comprovantes": "", "complemento": ""}, {"no": "1.16", "tipo": "Casos em que temos mais de um autor na petição", "subtipo": "", "definicao": "", "como": "A primeira coisa que devemos fazer é localizar onde a transação/problema reportado na petição aconteceu, em qual dos dois CPFs. Caso tenham transações/problemas reportados nos dois B.Os, devemos colocar todas as informações detalhadas sobre em qual conta cada transação aconteceu.\nAs interações, também devem ser descritas de forma detalhada, especificando em qual conta e qual a data que cada interação aconteceu.\nApós localizar a o motivo do reporte, devemos verificar se o shuffle puxou o B.O do cliente certo. Caso o sistema puxe o b.o do outro autor, devemos pegar as informações do kit básico sem a automação, ou seja, tirando todos os prints como é pedido no modelo de dossiê e nas premissas. Caso o b.o tenha sido carregado corretamente, podemos seguir com a tratativa normal.\nA criação da pasta no drive, deve ser baseada no Elaw, então em casos com mais de um autor, devemos criar a pastinha no drive baseada no cliente que está cadastrado no elaw", "comprovantes": "", "complemento": ""}, {"no": "1.17", "tipo": "SLA/Prazos", "subtipo": "", "definicao": "", "como": "O cumprimento das demandas judiciais dentro do prazo processual é imprescindível. O não atendimento pode resultar na aplicação de multa, na alegação de descumprimento pela parte contrária e em outras medidas que prejudiquem o andamento do processo.\n\nAo iniciar a tratativa da OBF, o time deve sempre verificar o prazo para cumprimento indicado no ticket do Jira através de sua fila correspondente e priorizar a ação dentro desse prazo:\n\n- Execute a ação solicitada, obtenha o comprovante (print/evidência) e anexe‑o ao dossiê.\n- Se não for possível cumprir o prazo, informe o jurídico imediatamente.", "comprovantes": "", "complemento": ""}], "Parcelamento": [{"no": "", "tipo": "OBF de cancelamento de um Parcelamento/RDP", "subtipo": "Nesse cenário o cliente não contestou nenhum transação/compra da fatura, mas sim o parcelamento/RDP em si, portanto toda", "definicao": "Todas as parcelas ja foram cobradas nas faturas;", "como": "Cliente pagou todas as parcelas;", "comprovantes": "Nenhum ajuste na fatura é necessário, mas os valores pagos de juros e encargos do parcelamento são passíveis de restituição no processo, portanto precisamos repassar essa informação ao escritório.\n\nSalvo casos de Acordo onde a devolução dos valores pagos indevidamente podem ser realizadas direto na fatura.", "complemento": ""}, {"no": "", "tipo": "OBF de Suspensão de cobrança/Tornar inexigível de uma compra/transação que entro", "subtipo": "Parcelamento é composto apenas pela(s) compra(s) / transação(ões) contestada(s) \n(cliente pagou todos os valores devidos", "definicao": "Todas as parcelas ja foram cobradas nas faturas;", "como": "Cliente pagou todas as parcelas;", "comprovantes": "Nenhum ajuste na fatura é necessário, mas os valores pagos sobre o parcelamento são passíveis de restituição no processo, portanto precisamos repassar essa informação ao escritório.\n\nSalvo casos de Acordo onde a devolução dos valores pagos indevidamente podem ser realizadas direto na fatura.", "complemento": ""}, {"no": "", "tipo": "OBF de Suspensão de cobrança/Tornar inexigível de uma compra/transação que entro", "subtipo": "Parcelamento é composto tanto pela(s) compra(s)/transação(ões) contestada(s) como também por compras devidas do cliente.", "definicao": "Todas as parcelas ja foram cobradas nas faturas;", "como": "Cliente pagou todas as parcelas;", "comprovantes": "Nenhum ajuste na fatura é necessário, mas os valores pagos sobre a compra contestada + juros do parcelamento são passíveis de restituição no processo, portanto precisamos repassar essa informação ao escritório.\n\nSalvo casos de Acordo onde a devolução dos valores pagos indevidamente podem ser realizadas direto na fatura.", "complemento": ""}, {"no": "", "tipo": "Casos onde houve mais do que um parcelamento", "subtipo": "Esses casos são mais complexos, mas os passos seguem sendo os mesmos. É importante ir analisando cada parcelamento indiv", "definicao": "", "como": "", "comprovantes": "", "complemento": ""}], "CSI": [{"no": "CSI.1", "tipo": "Suspensão de Cobrança", "subtipo": "CSI 1.1 - CARTÃO", "definicao": "Para pedidos de interrupção de contatos de cobrança por parte do Nubank ou para pedidos de fase Liminar, onde é solicitado a suspensão de cobrança de alguma transação até julgamento do processo.", "como": "", "comprovantes": "", "complemento": ""}, {"no": "CSI.1", "tipo": "Suspensão de Cobrança", "subtipo": "CSI 1.2 - EMPRESTIMO", "definicao": "", "como": "", "comprovantes": "", "complemento": ""}, {"no": "CSI.2", "tipo": "Tornar Inexigível", "subtipo": "CSI 2.1 - CARTÃO", "definicao": "Necessário para cumprir determinações para pedidos de Acordo ou em fase de Sentença onde é solicitado o cancelamento definitivo da cobrança de uma tra const FLAT = [];
Object.entries(RAW_DATA).forEach(([squad, rows]) => rows.forEach(r => FLAT.push({...r, squad})));

let selectedSquads = new Set(Object.keys(RAW_DATA));
let selectedTypes = new Set();
let searchQuery = '';
let viewMode = 'grid';

const squadColorMap = {};
Object.keys(RAW_DATA).forEach((s, i) => { squadColorMap[s] = i % 20; });

function getTypeClass(tipo) {
  if (!tipo) return 'type-default';
  const t = tipo.toLowerCase();
  if (t.includes('suspensão') || t.includes('suspensao')) return 'type-suspensao';
  if (t.includes('inexigível') || t.includes('inexigivel')) return 'type-inexigivel';
  if (t.includes('reativar')) return 'type-reativar';
  if (t.includes('cancelamento')) return 'type-cancelamento';
  if (t.includes('solicitação') || t.includes('solicitacao') || t.includes('informaç')) return 'type-solicitacao';
  if (t.includes('liminar')) return 'type-liminar';
  if (t.includes('parcelamento') || t.includes('repactuaç') || t.includes('rdp')) return 'type-parcelamento';
  if (t.includes('taxa')) return 'type-taxa';
  if (t.includes('plataforma') || t.includes('status') || t.includes('fila') || t.includes('sla') || t.includes('prazo') || t.includes('dossiê') || t.includes('dossie') || t.includes('formato')) return 'type-premissa';
  return 'type-default';
}

function getAllTypes() {
  const types = new Set();
  Object.values(RAW_DATA).forEach(rows => rows.forEach(r => { if (r.tipo) types.add(r.tipo); }));
  return [...types].sort();
}

function getFilteredData() {
  const q = searchQuery.toLowerCase();
  const results = {};
  Object.entries(RAW_DATA).forEach(([squad, rows]) => {
    if (!selectedSquads.has(squad)) return;
    const filtered = rows.filter(r => {
      if (selectedTypes.size > 0 && !selectedTypes.has(r.tipo)) return false;
      if (!q) return true;
      return [r.tipo, r.subtipo, r.definicao, r.como, r.no, squad].some(v => v && v.toLowerCase().includes(q));
    });
    if (filtered.length > 0) results[squad] = filtered;
  });
  return results;
}

function hl(text) {
  if (!searchQuery || !text) return escHtml(text || '');
  const re = new RegExp('(' + searchQuery.replace(/[.*+?^${}()|[\]\\]/g,'\\$&') + ')', 'gi');
  return escHtml(text).replace(re, '<mark>$1</mark>');
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function getFlatIndex(squad, r) {
  return FLAT.findIndex(item => item.squad === squad && item.no === r.no && item.subtipo === r.subtipo && item.tipo === r.tipo);
}

function openModal(idx) {
  const r = FLAT[idx];
  if (!r) return;
  document.getElementById('modalNo').textContent = r.squad + (r.no ? ' · ' + r.no : '');
  document.getElementById('modalTipo').textContent = r.tipo || r.subtipo || 'Premissa';
  document.getElementById('modalSubtipo').textContent = r.subtipo || '';

  const labels = {
    'Premissas Básicas': ['📋','O Que','⚙️','Como / Descrição','❓','Por Que','📎','Detalhes Complementares'],
    'Parcelamento':      ['📋','Cenário','⚙️','Status do Parcelamento','👤','Status do Cliente','✅','Ação Necessária'],
  };
  const lbl = labels[r.squad] || ['📋','Definição','⚙️','Como deve ser cumprida','📎','Comprovantes necessários','💡','Complemento em casos particulares'];

  const sections = [
    r.definicao    && { icon: lbl[0], label: lbl[1], text: r.definicao },
    r.como         && { icon: lbl[2], label: lbl[3], text: r.como },
    r.comprovantes && { icon: lbl[4], label: lbl[5], text: r.comprovantes },
    r.complemento  && { icon: lbl[6], label: lbl[7], text: r.complemento },
  ].filter(Boolean);

  document.getElementById('modalBody').innerHTML = sections.length
    ? sections.map(s => `<div class="modal-section"><div class="modal-section-header"><span>${s.icon}</span>${escHtml(s.label)}</div><div class="modal-section-content">${escHtml(s.text)}</div></div>`).join('')
    : '<div style="color:var(--text3);padding:20px;text-align:center">Sem detalhes adicionais</div>';

  document.getElementById('modal').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  document.getElementById('modal').classList.remove('open');
  document.body.style.overflow = '';
}

function renderSquadList() {
  document.getElementById('squadList').innerHTML = Object.entries(RAW_DATA).map(([squad, rows]) =>
    `<div class="squad-item ${selectedSquads.has(squad) ? 'active' : ''}" onclick="toggleSquad(${JSON.stringify(squad)})">
      <div class="squad-checkbox"></div>
      <span class="squad-name">${escHtml(squad)}</span>
      <span class="squad-count">${rows.length}</span>
    </div>`
  ).join('');
}

function renderTypeTags() {
  document.getElementById('typeTags').innerHTML = getAllTypes().map(t =>
    `<button class="type-tag ${selectedTypes.has(t) ? 'active' : ''}" onclick="toggleType(${JSON.stringify(t)})">${escHtml(t)}</button>`
  ).join('');
}

function renderActiveFilters() {
  const pills = [];
  if (searchQuery) pills.push(`<div class="filter-pill">🔍 "${escHtml(searchQuery)}" <button onclick="clearSearch()">×</button></div>`);
  selectedTypes.forEach(t => pills.push(`<div class="filter-pill">${escHtml(t)} <button onclick="removeType(${JSON.stringify(t)})">×</button></div>`));
  document.getElementById('activeFilters').innerHTML = pills.join('');
}

function renderContent() {
  const data = getFilteredData();
  const total = Object.values(data).reduce((a, r) => a + r.length, 0);
  document.getElementById('resultCount').textContent = total;
  document.getElementById('statVisible').textContent = total;
  document.getElementById('statSquads').textContent = Object.keys(data).length;
  const el = document.getElementById('content');
  if (total === 0) {
    el.innerHTML = `<div class="empty"><div class="empty-icon">🔍</div><h3>Nenhuma OBF encontrada</h3><p>Tente ajustar os filtros ou a busca</p></div>`;
    return;
  }
  if (viewMode === 'grid') {
    el.innerHTML = Object.entries(data).map(([squad, rows]) => {
      const ci = squadColorMap[squad];
      return `<div class="squad-group">
        <div class="squad-group-header">
          <div class="squad-color-bar sc${ci}"></div>
          <div class="squad-badge">${escHtml(squad)}</div>
          <div class="squad-group-count">${rows.length} itens</div>
        </div>
        <div class="cards-grid">${rows.map(r => renderCard(r, squad)).join('')}</div>
      </div>`;
    }).join('');
  } else {
    const allRows = Object.entries(data).flatMap(([squad, rows]) => rows.map(r => ({...r, squad})));
    el.innerHTML = `<table class="table-view">
      <thead><tr><th>Seção</th><th>Nº</th><th>Tipo</th><th>Subtipo</th><th>Descrição</th><th></th></tr></thead>
      <tbody>${allRows.map(r => {
        const idx = getFlatIndex(r.squad, r);
        return `<tr onclick="openModal(${idx})">
          <td class="squad-cell">${hl(r.squad)}</td>
          <td style="font-family:Syne,sans-serif;font-size:11px;color:var(--text3)">${hl(r.no)}</td>
          <td class="tipo-cell">${hl(r.tipo)}</td>
          <td>${hl(r.subtipo)}</td>
          <td><div class="truncate-cell">${hl(r.definicao)}</div></td>
          <td><button class="expand-btn">Ver tudo →</button></td>
        </tr>`;
      }).join('')}</tbody>
    </table>`;
  }
}

function renderCard(r, squad) {
  const idx = getFlatIndex(squad, r);
  const tc = getTypeClass(r.tipo);
  const titulo = r.tipo || r.subtipo || 'Premissa';
  return `<div class="obf-card" onclick="openModal(${idx})">
    <div class="card-header">
      ${r.no ? `<div class="card-no">${hl(r.no)}</div>` : ''}
      <div class="card-titles">
        <div class="card-tipo">${hl(titulo)}</div>
        ${r.subtipo && r.subtipo !== titulo ? `<div class="card-subtipo">${hl(r.subtipo)}</div>` : ''}
      </div>
      <div class="card-type-badge ${tc}" title="${escHtml(titulo)}">${escHtml(titulo)}</div>
    </div>
    <div class="card-body">
      ${r.definicao ? `<div class="card-section"><div class="card-section-label">Descrição</div><div class="card-section-text">${hl(r.definicao)}</div></div>` : ''}
      ${r.como ? `<div class="card-section"><div class="card-section-label">Como / Por quê</div><div class="card-section-text">${hl(r.como)}</div></div>` : ''}
    </div>
    <div class="card-footer">
      <div class="card-squad-chip">◉ ${escHtml(squad)}</div>
      <button class="expand-btn">Ver tudo →</button>
    </div>
  </div>`;
}

function toggleSquad(squad) {
  if (selectedSquads.has(squad)) selectedSquads.delete(squad); else selectedSquads.add(squad);
  renderSquadList(); renderContent();
}
function toggleType(type) {
  if (selectedTypes.has(type)) selectedTypes.delete(type); else selectedTypes.add(type);
  renderTypeTags(); renderActiveFilters(); renderContent();
}
function removeType(type) { selectedTypes.delete(type); renderTypeTags(); renderActiveFilters(); renderContent(); }
function clearSearch() { document.getElementById('searchInput').value = ''; searchQuery = ''; renderActiveFilters(); renderContent(); }
function selectAll() { selectedSquads = new Set(Object.keys(RAW_DATA)); renderSquadList(); renderContent(); }
function deselectAll() { selectedSquads.clear(); renderSquadList(); renderContent(); }
function applyFilters() { searchQuery = document.getElementById('searchInput').value; renderActiveFilters(); renderContent(); }
function setView(mode) {
  viewMode = mode;
  document.getElementById('btnGrid').classList.toggle('active', mode === 'grid');
  document.getElementById('btnTable').classList.toggle('active', mode === 'table');
  renderContent();
}

document.getElementById('modal').addEventListener('click', e => { if (e.target === document.getElementById('modal')) closeModal(); });
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

renderSquadList(); renderTypeTags(); renderContent();
</script>
</body>
</html>
